# =============================================================================
# Tugboat — Drupal on Acquia
# =============================================================================
# Seeded once (overwrite:false) — owned by the site. Every phase runs `composer install` first, which is what materializes the gitignored .tugboat/scripts/*
# (they are re-scaffolded every install, so fixes flow automatically). Non-secret
# settings live in .tugboat/tugboat.env; secrets (SSH keys, tokens) go in the
# Tugboat dashboard. Bump the php image tag here to change PHP version.
# =============================================================================
version: 1
services:
  php:
    image: tugboatqa/php:8.3-apache
    default: true
    depends:
      - mysql
    commands:
      # `composer install` (re)materializes the gitignored .tugboat/scripts/* and
      # installs deps. Every phase runs it first — committed here in config.yml,
      # never relying on a gitignored script existing — then re-applies +x.
      init:
        - composer install --no-interaction --no-dev --optimize-autoloader
        - chmod +x ./.tugboat/scripts/*.sh
        - ./.tugboat/scripts/install-tools.sh
      update:
        - composer install --no-interaction --no-dev --optimize-autoloader
        - chmod +x ./.tugboat/scripts/*.sh
        - ./.tugboat/scripts/build.sh
        - ./.tugboat/scripts/database.sh
        - ./.tugboat/scripts/files.sh
      build:
        - composer install --no-interaction --no-dev --optimize-autoloader
        - chmod +x ./.tugboat/scripts/*.sh
        - ./.tugboat/scripts/build.sh
        - ./.tugboat/scripts/deploy.sh

  memcached:
    image: tugboatqa/memcached:latest

  mysql:
    image: tugboatqa/mysql:8.0
    commands:
      init:
        - mysql -e "SET GLOBAL max_allowed_packet=536870912;"
